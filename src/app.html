<!doctype html>
<html lang="en" class="no-js">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#fdfbf7" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e0d0b" />
		<meta name="google-site-verification" content="KbjWZh0BthgrMFpZpOCeZU982ncRKKXkUTvXLayYBkU" />
		<!-- rel=me links — bidirectional identity verification with the organiser's site -->
		<link rel="me" href="https://www.frederickmadore.com" />
		<script>
			(function () {
				// Signal JS availability: CSS keeps scroll-reveal content visible
				// for no-JS visitors, crawlers, and print (see .js .scroll-reveal).
				document.documentElement.classList.replace('no-js', 'js');
				const saved = localStorage.getItem('theme');
				if (
					saved === 'dark' ||
					(!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)
				) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
