# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Noise-reduction strategy:
#   * MINOR + PATCH updates are bundled into a single PR per ecosystem.
#   * npm MAJOR bumps stay ungrouped so each lands in its own PR for review
#     (they can carry breaking changes).
#   * GitHub Actions are pinned to major tags (@v6, @v4, …), so their updates are
#     almost always "major" bumps — grouping them all keeps that to one PR.
#   * Checks run monthly. Security updates are unaffected and still arrive immediately.
version: 2

updates:
  # JavaScript/TypeScript dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      time: '06:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'javascript'
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    groups:
      # All low-risk updates in one PR; major bumps come separately.
      npm-minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions used in workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      time: '06:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      github-actions:
        patterns:
          - '*'
